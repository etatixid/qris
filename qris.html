<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pembayaran QRIS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#181818;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:15px;

}

/*========================
FRAME
========================*/

.container{

width:100%;

max-width:520px;

background:#ffffff;

border-radius:24px;

overflow:hidden;

box-shadow:
0 15px 40px rgba(0,0,0,.25);

}

/*========================
HEADER
========================*/

.header{

background:linear-gradient(
135deg,
#00c853,
#00e676
);

padding:25px;

text-align:center;

color:white;

}

.header h1{

font-size:30px;

font-weight:800;

}

.header p{

margin-top:8px;

font-size:15px;

opacity:.95;

}

/*========================
TIMER
========================*/

.timer-box{

padding:25px;

text-align:center;

background:#fafafa;

border-bottom:1px solid #eeeeee;

}

.timer-label{

font-size:15px;

color:#666666;

margin-bottom:10px;

}

#timer{

font-size:52px;

font-weight:800;

color:#00a651;

transition:.3s;

}

.warning{

color:#d50000 !important;

animation:blink .8s infinite;

}

@keyframes blink{

0%{
opacity:1;
}

50%{
opacity:.2;
}

100%{
opacity:1;
}

}

/*========================
QRIS
========================*/

.qris{

padding:25px;

text-align:center;

}

.qris img{

width:100%;

max-width:300px;

margin:auto;

display:block;

border-radius:12px;

border:1px solid #dddddd;

}

/*========================
TOTAL
========================*/

.total-box{

margin-top:25px;

padding-top:20px;

border-top:2px dashed #dddddd;

}

.total-label{

font-size:16px;

color:#666666;

}

#total{

margin-top:8px;

font-size:38px;

font-weight:800;

color:#00a651;

}

/*========================
DETAIL
========================*/

.detail{

margin-top:25px;

text-align:left;

}

.row{

display:flex;

justify-content:space-between;

padding:12px 0;

border-bottom:1px dashed #eeeeee;

}

.row span:first-child{

color:#777777;

}

.row span:last-child{

font-weight:700;

color:#222222;

}

/*========================
STATUS
========================*/

#status{

margin-top:20px;

text-align:center;

font-weight:700;

font-size:18px;

color:#d50000;

}

/*========================
BUTTON
========================*/

.btn{

width:100%;

margin-top:25px;

padding:16px;

border:none;

border-radius:14px;

background:#00c853;

color:white;

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.btn:hover{

background:#00a651;

}

/*========================
RESPONSIVE
========================*/

@media(max-width:600px){

.container{

border-radius:0;

min-height:100vh;

}

#timer{

font-size:42px;

}

#total{

font-size:32px;

}

.header h1{

font-size:26px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>PEMBAYARAN QRIS</h1>

<p>Silakan lakukan pembayaran sebelum waktu habis.</p>

</div>

<div class="timer-box">

<div class="timer-label">

Sisa Waktu Pembayaran

</div>

<div id="timer">

03:00

</div>

</div>

<div class="qris">

<img src="qris.png" alt="QRIS">

<div class="total-box">

<div class="total-label">

Total Pembayaran

</div>

<div id="total">

Rp 0

</div>

</div>

<div class="detail">

<div class="row">

<span>Nama</span>

<span id="nama">-</span>

</div>

<div class="row">

<span>Jenis Tiket</span>

<span id="jenis">-</span>

</div>

<div class="row">

<span>Jumlah Tiket</span>

<span id="jumlah">0</span>

</div>

<div class="row">

<span>No. WhatsApp</span>

<span id="wa">-</span>

</div>

</div>

<div id="status"></div>

<button class="btn" onclick="restartTimer()">

Refresh QRIS

</button>

</div>

</div>

<script>

/*=====================================
AMBIL DATA DARI FORM.HTML
=====================================*/

const total =
Number(localStorage.getItem("totalPembayaran") || 0);

const nama =
localStorage.getItem("nama") || "-";

const jenis =
localStorage.getItem("jenisTiket") || "-";

const jumlah =
localStorage.getItem("jumlahTiket") || "0";

const wa =
localStorage.getItem("wa") || "-";

/*=====================================
TAMPILKAN DATA
=====================================*/

document.getElementById("total").innerHTML =
"Rp " + total.toLocaleString("id-ID");

document.getElementById("nama").innerHTML =
nama;

document.getElementById("jenis").innerHTML =
jenis;

document.getElementById("jumlah").innerHTML =
jumlah;

document.getElementById("wa").innerHTML =
wa;

/*=====================================
TIMER
=====================================*/

const DURASI = 180;

let sisa = DURASI;

let interval;

/*=====================================*/

function updateTimer(){

const menit =
Math.floor(sisa / 60);

const detik =
sisa % 60;

const timer =
document.getElementById("timer");

timer.innerHTML =
String(menit).padStart(2,"0")
+
":"
+
String(detik).padStart(2,"0");

/*=========================
15 DETIK TERAKHIR
=========================*/

if(sisa<=15){

timer.classList.add("warning");

}else{

timer.classList.remove("warning");

}

/*=========================
HABIS
=========================*/

if(sisa<=0){

clearInterval(interval);

timer.innerHTML="00:00";

document.getElementById("status").innerHTML=

"❌ QRIS EXPIRED<br>Silakan Refresh QRIS";

return;

}

sisa--;

}

/*=====================================*/

function startTimer(){

clearInterval(interval);

sisa=DURASI;

document.getElementById("status").innerHTML="";

updateTimer();

interval=setInterval(updateTimer,1000);

}

/*=====================================*/

function restartTimer(){

startTimer();

}

/*=====================================
JALANKAN
=====================================*/

startTimer();

/*=====================================
VALIDASI DATA
=====================================*/

if(total <= 0){

document.getElementById("status").innerHTML =
"⚠️ Data pembayaran tidak ditemukan.<br>Silakan kembali ke halaman pemesanan.";

document.querySelector(".btn").disabled = true;

document.querySelector(".btn").style.background = "#999";

}

/*=====================================
REFRESH QR
=====================================*/

function refreshQR(){

// Jika nanti menggunakan API QRIS,
// tambahkan proses generate QR baru di sini.

startTimer();

}

document.querySelector(".btn").addEventListener("click",refreshQR);

/*=====================================
AUTO UPDATE TAHUN
=====================================*/

console.log("QRIS Payment Ready");

/*=====================================
SELESAI
=====================================*/

</script>

</body>
</html>
